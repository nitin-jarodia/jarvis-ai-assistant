<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis AI Assistant</title>
  <meta name="description" content="Jarvis — your personal AI assistant. Chat, take notes, and get things done." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">Jarvis</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" id="navChat" data-tab="chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>Chat</span>
        </button>
        <button class="nav-btn" id="navNotes" data-tab="notes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
          <span>Notes</span>
        </button>
        <button class="nav-btn" id="navHistory" data-tab="history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <span>History</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          New Chat
        </button>
      </div>
    </aside>

    <main class="main-content">
      <section class="tab-panel" id="tabChat">
        <div class="chat-header">
          <h1 class="chat-title" id="chatTitle">New Conversation</h1>
          <div class="header-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Online</span>
          </div>
        </div>

        <div class="messages-area" id="messagesArea">
          <div class="welcome-splash" id="welcomeSplash">
            <div class="welcome-icon">⚡</div>
            <h2>Good to see you.</h2>
            <p>I'm Jarvis, your personal AI assistant.<br/>Ask me anything to get started.</p>
            <div class="suggestion-chips">
              <button class="chip" data-msg="Hello Jarvis! Who are you?">Who are you?</button>
              <button class="chip" data-msg="What's today's date?">Today's date</button>
              <button class="chip" data-msg="What time is it?">Current time</button>
              <button class="chip" data-msg="How can you help me?">How can you help?</button>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-box">
            <button class="mic-btn" id="micBtn" aria-label="Voice input" title="Start Listening" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; margin-left:12px; margin-right:-4px;">
              🎤
            </button>
            <textarea
              id="messageInput"
              placeholder="Message Jarvis..."
              rows="1"
              autocomplete="off"
              aria-label="Message input"
            ></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
          <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
        </div>
      </section>

      <section class="tab-panel hidden" id="tabNotes">
        <div class="panel-header">
          <h1>Notes</h1>
          <button class="action-btn" id="addNoteBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add Note
          </button>
        </div>

        <div class="note-editor hidden" id="noteEditor">
          <input type="text" id="noteTitleInput" placeholder="Note title..." />
          <textarea id="noteContentInput" placeholder="Write your note here..."></textarea>
          <div class="note-editor-actions">
            <button class="btn-primary" id="saveNoteBtn">Save Note</button>
            <button class="btn-ghost" id="cancelNoteBtn">Cancel</button>
          </div>
        </div>

        <div class="notes-grid" id="notesGrid">
          <div class="empty-state">
            <span>📝</span>
            <p>No notes yet. Create your first note!</p>
          </div>
        </div>
      </section>

      <section class="tab-panel hidden" id="tabHistory">
        <div class="panel-header">
          <h1>Chat History</h1>
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-state">
            <span>🕑</span>
            <p>No conversations yet. Start chatting!</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
